version: "3.9"

services:
  db:
    build: ./database
    container_name: postgres_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mynet

  backend:
    build: ./backend
    container_name: backend_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "3000:3000"
    networks:
      - mynet

volumes:
  pgdata:

networks:
  mynet:
    driver: bridge